<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>QPFP Implementation Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@500;600&family=Lato:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --orange:#FF5000; --orange-dark:#B33900; --ink:#333333; --cream:#EFE7DC;
    --mint:#D7E7DF; --slate:#6A7D8B; --gray:#B0B0B0; --white:#FFFFFF;
    --radius:10px;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Lato',sans-serif;background-color:#ffffff;background-image:url("data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI2MDAiIGhlaWdodD0iNjAwIiB2aWV3Qm94PSIwIDAgNjAwIDYwMCI+CjxwYXRoIGQ9Ik0gNjAwLDYwMCBMIDYwMCwxODAgTCAyNjAsNjAwIFoiIGZpbGw9IiNGRjUwMDAiIG9wYWNpdHk9IjAuMDkiLz4KPC9zdmc+");background-repeat:no-repeat;background-position:bottom right;background-size:600px 600px;background-attachment:fixed;color:var(--ink);}
  h1,h2,h3{font-family:'Lora',serif;font-weight:600;margin:0;}
  .wrap{max-width:900px;margin:0 auto;padding:32px 20px 80px;}
  .wrap.wide{max-width:90%;}
  .wrap.left-aligned{margin-left:5%;margin-right:auto;}
  .icon-btn{background:none;border:1px solid var(--gray);border-radius:6px;width:30px;height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--slate);padding:0;flex-shrink:0;}
  .icon-btn:hover{border-color:var(--orange);color:var(--orange);}
  .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:28px;flex-wrap:wrap;gap:12px;}
  .brand{display:flex;align-items:center;gap:10px;}
  .brand .mark{width:34px;height:34px;background:var(--orange);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-family:'Lora',serif;font-weight:600;font-size:15px;}
  .brand h1{font-size:19px;color:var(--ink);}
  .brand p{margin:0;font-size:12px;color:var(--slate);}
  .navbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
  .navlink{font-family:'Lato';font-size:13px;font-weight:700;color:var(--slate);text-decoration:none;cursor:pointer;background:none;border:none;padding:7px 12px;border-radius:999px;}
  button.logout{font-family:'Lato';font-size:13px;font-weight:700;color:var(--orange);background:none;border:1px solid var(--orange);padding:7px 14px;border-radius:999px;cursor:pointer;}
  .tabs{display:flex;background:var(--white);border-radius:999px;padding:4px;border:1px solid var(--gray);margin-bottom:20px;max-width:fit-content;}
  .tabs button{border:none;background:none;padding:8px 18px;border-radius:999px;font-family:'Lato';font-size:13px;font-weight:700;cursor:pointer;color:var(--slate);}
  .tabs button.active{background:var(--orange);color:#fff;}
  .card{background:var(--white);border:1px solid #e6ded1;border-radius:var(--radius);padding:20px 22px;margin-bottom:14px;}
  .card h3{font-size:15px;margin-bottom:4px;}
  .card .sub{font-size:12px;color:var(--slate);margin-bottom:12px;}
  .row{display:flex;gap:10px;margin-bottom:10px;flex-wrap:wrap;}
  select,input,textarea{font-family:'Lato';font-size:13px;padding:9px 10px;border:1px solid var(--gray);border-radius:7px;background:#fff;color:var(--ink);}
  input:disabled{background:var(--cream);color:var(--slate);cursor:not-allowed;}
  select,input{flex:1;min-width:150px;}
  textarea{width:100%;min-height:60px;resize:vertical;}
  button.btn{font-family:'Lato';font-weight:700;font-size:13px;background:var(--orange);color:#fff;border:none;padding:9px 16px;border-radius:7px;cursor:pointer;margin-top:8px;}
  button.btn:hover{background:var(--orange-dark);}
  button.small{font-size:12px;padding:6px 12px;}
  .stat-row{display:flex;gap:12px;margin-bottom:18px;flex-wrap:wrap;}
  .stat{background:var(--white);border-radius:var(--radius);padding:14px 18px;flex:1;min-width:120px;border:1px solid #e6ded1;}
  .stat .num{font-family:'Lora',serif;font-size:22px;color:var(--orange);}
  .stat .lbl{font-size:12px;color:var(--slate);}
  .badges{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px;}
  .badge{background:var(--mint);color:#1c4a3d;font-size:11px;font-weight:700;padding:4px 10px;border-radius:999px;}
  .badge.big{font-size:16px;padding:6px 16px;font-weight:800;}
  .section-title{font-size:13px;text-transform:uppercase;letter-spacing:.04em;color:var(--slate);margin:26px 0 10px;font-weight:700;}
  table{width:100%;border-collapse:collapse;font-size:13px;}
  th,td{text-align:left;padding:8px 6px;border-bottom:1px solid #e6ded1;}
  th{color:var(--slate);font-weight:700;font-size:12px;}
  .empty{font-size:13px;color:var(--slate);font-style:italic;}
  .pill{display:inline-block;font-size:11px;background:var(--cream);border:1px solid var(--gray);padding:2px 8px;border-radius:999px;margin-left:6px;}
  a.link{font-size:12px;color:var(--slate);text-decoration:underline;cursor:pointer;}
  .note{font-size:11px;color:var(--slate);margin-top:10px;}
  .avatar{width:44px;height:44px;border-radius:50%;background:var(--slate);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;overflow:hidden;flex-shrink:0;}
  .avatar img{width:100%;height:100%;object-fit:cover;}
  .profile-row{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
  .mark-img{width:34px;height:34px;border-radius:8px;object-fit:cover;flex-shrink:0;}
  .brand-strip{height:6px;background:linear-gradient(90deg,var(--orange),var(--orange-dark));position:fixed;top:0;left:0;right:0;z-index:500;}
  .card{box-shadow:0 1px 3px rgba(51,51,51,.05);}

  .login-header{margin-bottom:28px;}
  .login-logos{display:flex;align-items:center;gap:16px;margin-bottom:18px;}
  .login-logos .nfp-logo{height:56px;width:auto;}
  .login-logos .qpfp-logo{height:56px;width:56px;border-radius:9px;object-fit:cover;}
  .logo-divider{width:1px;height:30px;background:var(--gray);}
  .login-header h1{font-size:28px;margin-bottom:4px;}
  .login-header p{margin:0;font-size:13px;color:var(--slate);}

  /* public stories wall */
  .wall-outer{overflow:hidden;max-height:640px;border-radius:var(--radius);position:relative;touch-action:none;-webkit-mask-image:linear-gradient(to bottom, transparent, black 6%, black 94%, transparent);mask-image:linear-gradient(to bottom, transparent, black 6%, black 94%, transparent);}
  .wall-inner{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;align-items:start;animation-name:scrollUp;animation-timing-function:linear;animation-iteration-count:infinite;}
  @keyframes scrollUp{ from{transform:translateY(0);} to{transform:translateY(-50%);} }
  @media (prefers-reduced-motion:reduce){ .wall-inner{animation:none;} }
  .story-card{min-height:150px;background:var(--white);border:1px solid #e6ded1;border-radius:14px;padding:16px;display:flex;flex-direction:column;gap:8px;cursor:pointer;overflow:hidden;transition:box-shadow .15s;}
  .story-card:hover{box-shadow:0 4px 14px rgba(0,0,0,.08);}
  .story-card .who{display:flex;align-items:center;gap:8px;}
  .story-card .who .nm{font-weight:700;font-size:13px;}
  .story-card .who .city{font-size:10.5px;color:var(--slate);}
  .story-card .tag{font-weight:700;font-size:11px;background:var(--mint);color:#1c4a3d;padding:3px 10px;border-radius:999px;display:inline-block;width:fit-content;}
  .tag-pill{background:var(--mint);color:#1c4a3d;font-weight:700;font-size:11.5px;padding:4px 10px;border-radius:999px;white-space:nowrap;display:inline-block;}
  .story-card .txt{font-size:12.5px;color:var(--ink);line-height:1.45;white-space:pre-wrap;overflow:hidden;}
  @media (max-width:640px){ .wall-inner{grid-template-columns:repeat(2,1fr);} }

  .modal-backdrop{position:fixed;inset:0;background:rgba(51,51,51,.55);display:flex;align-items:center;justify-content:center;z-index:1000;padding:24px;}
  .modal-box{background:#fff;border-radius:16px;padding:32px;width:60vw;height:60vh;max-width:60vw;max-height:60vh;overflow-y:auto;}
  .modal-box .who{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
  .modal-box .nm{font-weight:700;font-size:17px;}
  .modal-box .city{font-size:12px;color:var(--slate);}
  .modal-box .tag{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;}
  .modal-box .txt{white-space:pre-wrap;font-size:15px;line-height:1.6;margin-top:12px;}
  .modal-close{float:right;background:none;border:none;font-size:20px;cursor:pointer;color:var(--slate);}
  @media (max-width:700px){ .modal-box{width:90vw;height:80vh;max-width:90vw;max-height:80vh;} }
</style>
</head>

async function loadShared(){
  try{ const r = await window.storage.get("stories", true); state.stories = r ? JSON.parse(r.value) : []; }
  catch(e){ state.stories = []; }
  try{ const r = await window.storage.get("profiles", true); state.profiles = r ? JSON.parse(r.value) : []; }
  catch(e){ state.profiles = []; }
  try{
    const r = await window.storage.get("batches", true);
    if(r){ state.batches = JSON.parse(r.value); }
    else {
      state.batches = [{name:"Current Batch 14",active:true},{name:"Current Batch 15",active:true},{name:"Current Batch 16",active:true}];
      await saveBatches();
    }
  } catch(e){
    state.batches = [{name:"Current Batch 14",active:true},{name:"Current Batch 15",active:true},{name:"Current Batch 16",active:true}];
  }
  try{
    const r = await window.storage.get("levels", true);
    if(r){ state.levels = JSON.parse(r.value); }
    else { state.levels = JSON.parse(JSON.stringify(DEFAULT_LEVELS)); await saveLevels(); }
  } catch(e){ state.levels = JSON.parse(JSON.stringify(DEFAULT_LEVELS)); }
  try{
    const r = await window.storage.get("sections", true);
    if(r){ state.sections = JSON.parse(r.value); }
    else { state.sections = JSON.parse(JSON.stringify(DEFAULT_SECTIONS)); await saveSections(); }
  } catch(e){ state.sections = JSON.parse(JSON.stringify(DEFAULT_SECTIONS)); }
  try{
    const r = await window.storage.get("tags", true);
    if(r){ state.tags = JSON.parse(r.value); }
    else { state.tags = JSON.parse(JSON.stringify(DEFAULT_TAGS)); await saveTags(); }
  } catch(e){ state.tags = JSON.parse(JSON.stringify(DEFAULT_TAGS)); }
  try{
    const r = await window.storage.get("admin-credentials", true);
    if(r){ state.adminCreds = JSON.parse(r.value); }
    else { await saveAdminCreds(); }
  } catch(e){ /* keep in-memory default */ }
}
async function saveAdminCreds(){
  try{ await window.storage.set("admin-credentials", JSON.stringify(state.adminCreds), true); }
  catch(e){ console.error("Could not save admin credentials:", e); }
}
async function saveLevels(){
  try{ await window.storage.set("levels", JSON.stringify(state.levels), true); }
  catch(e){ console.error("Could not save levels:", e); }
}
async function saveSections(){

  catch(e){ console.error("Could not save sections:", e); }
}

}

  newTitle = (newTitle||"").trim();

}

// ---------- auth ----------
function tryParticipantLogin(email){
  email = email.trim().toLowerCase();
  if(!email){ alert("Enter your registered email."); return; }
  const existing = state.profiles.find(p=>p.email===email);
  if(existing){
    if(existing.approved){
      state.profile = existing; state.isAdmin=false; state.screen="dashboard"; render();
    } else {
      state.pendingEmail = email; state.screen="pending"; render();
    }
  } else {
    state.pendingEmail = email; state.loginTab = "participant-new"; render();
  }
}

async function completeEnrollment(status){
  if(!status){ alert("Select your status first."); return; }
  const profile = {email: state.pendingEmail, status, name:"", city:"", photo:null, approved:false, pendingStatus:null};
  state.profiles.push(profile);
  await saveProfiles();
  state.screen="pending";
  render();
}

function tryAdminLogin(email, password){
  email = (email||"").trim().toLowerCase();
  if(email === state.adminCreds.email.toLowerCase() && password === state.adminCreds.password){
    state.isAdmin=true; state.profile=null; state.screen="dashboard"; render();
  } else {
    alert("Incorrect email or password.");
  }
}



function logout(){
  state.profile=null; state.isAdmin=false; state.loginTab="participant"; state.pendingEmail=null; state.screen="login";
  render();
}

function goStories(){ state.screen="stories"; render(); }
function goDashboard(){ state.screen="dashboard"; render(); }
function goProfile(){ state.tempPhoto=null; state.screen="profile"; render(); }
function backToLogin(){ state.screen="login"; render(); }

function isBatchStatus(status){ return state.batches.some(b=>b.name===status); }

function goLeaderboard(){
  state.leaderboardView = isBatchStatus(state.profile.status) ? "batch" : "community";
  state.leaderboardSearch = "";
  state.screen="leaderboard";
  render();
}
function setLeaderboardView(view){
  if(view==="batch" && !isBatchStatus(state.profile.status)) return;
  state.leaderboardView = view;
  render();
}
function handleSearchInput(v){
  state.leaderboardSearch = v;
  const el = document.getElementById("leaderboard-rows");
  if(el) el.innerHTML = leaderboardRowsHtml();
}

function leaderboardRows(){
  let list = state.leaderboardView==="batch"
    ? state.profiles.filter(p=>p.status===state.profile.status)
    : state.profiles.slice();
  const q = state.leaderboardSearch.trim().toLowerCase();
  if(q) list = list.filter(p=>(p.name||p.email||"").toLowerCase().includes(q));
  return list.map(p=>({p, pts: pointsFor(p.email)})).sort((a,b)=>b.pts-a.pts);
}

function leaderboardRowsHtml(){
  const rows = leaderboardRows();
  if(!rows.length) return `<tr><td colspan="5" class="empty">No participants found.</td></tr>`;
  return rows.map((r,i)=>{
    const badges = badgesFor(r.p.email).join(", ") || "—";
    return `<tr><td>${i+1}</td><td>${r.p.name||r.p.email}</td><td>${r.p.city||"—"}</td><td>${r.pts}</td><td>${badges}</td></tr>`;
  }).join("");
}

async function approveParticipant(email){
  const p = state.profiles.find(x=>x.email===email);
  if(p){ p.approved = true; await saveProfiles(); render(); }
}
async function rejectPendingParticipant(email){
  if(!confirm("Reject and remove this registration?")) return;
  state.profiles = state.profiles.filter(p=>p.email!==email);
  await saveProfiles(); render();
}
async function suspendParticipant(email){
  if(!confirm("Suspend this participant's access? They will need to be re-approved.")) return;
  const p = state.profiles.find(x=>x.email===email);
  if(p){ p.approved = false; await saveProfiles(); render(); }
}
async function deleteParticipant(email){
  if(!confirm("Permanently delete this participant profile? Their submitted stories will remain but show as unlinked. This cannot be undone.")) return;
  state.profiles = state.profiles.filter(p=>p.email!==email);
  await saveProfiles(); render();
}

// ---------- profile ----------
function handlePhotoChange(input){
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ()=>{
    state.tempPhoto = reader.result;
    const img = document.getElementById("photo-preview-img");
    if(img) img.src = state.tempPhoto;
  };
  reader.readAsDataURL(file);
}

async function saveProfile(name, city){
  state.profile.name = name.trim();
  state.profile.city = city.trim();
  if(state.tempPhoto) state.profile.photo = state.tempPhoto;
  const idx = state.profiles.findIndex(p=>p.email===state.profile.email);
  if(idx>-1) state.profiles[idx] = state.profile;
  await saveProfiles();
  state.tempPhoto=null;
  state.screen="dashboard";
  render();
}

async function requestStatusChange(newStatus){
  if(!newStatus || newStatus===state.profile.status){ alert("Select a different status to request a change."); return; }
  state.profile.pendingStatus = newStatus;
  const idx = state.profiles.findIndex(p=>p.email===state.profile.email);
  if(idx>-1) state.profiles[idx] = state.profile;
  await saveProfiles();
  render();
}

async function cancelStatusChange(){
  state.profile.pendingStatus = null;
  const idx = state.profiles.findIndex(p=>p.email===state.profile.email);
  if(idx>-1) state.profiles[idx] = state.profile;
  await saveProfiles();
  render();
}

async function approveStatusChange(email){
  const p = state.profiles.find(x=>x.email===email);
  if(p && p.pendingStatus){ p.status = p.pendingStatus; p.pendingStatus = null; await saveProfiles(); render(); }
}

async function rejectStatusChange(email){
  const p = state.profiles.find(x=>x.email===email);
  if(p){ p.pendingStatus = null; await saveProfiles(); render(); }
}

function profileFor(email){
  return state.profiles.find(p=>p.email===email) || {name:"", city:"", photo:null};
}
function avatarHtml(email, size){
  const p = profileFor(email);
  if(p.photo) return `<div class="avatar" style="width:${size}px;height:${size}px"><img src="${p.photo}"></div>`;
  const initial = (p.name||email||"?").trim().charAt(0).toUpperCase();
  return `<div class="avatar" style="width:${size}px;height:${size}px">${initial}</div>`;
}
function displayName(email){
  const p = profileFor(email);
  return p.name && p.name.trim() ? p.name : email;
}

// ---------- story logic ----------
function levelFullLabel(levelKey){ return state.sections.find(x=>x.id===levelKey)?.label || levelKey; }

function protoolRowHtml(containerId, presetLevel, presetProtool){
  const protoolOptions = presetLevel ? state.levels[presetLevel].protools : [];
  return `
    <div class="row protool-row" style="align-items:center;">
      <select class="protool-level-select" onchange="renderProtoolOptionsForRow(this)">
        <option value="">Select level</option>
        <option value="levelI" ${presetLevel==='levelI'?'selected':''}>${levelFullLabel('levelI')}</option>
        <option value="levelII" ${presetLevel==='levelII'?'selected':''}>${levelFullLabel('levelII')}</option>
        <option value="levelIII" ${presetLevel==='levelIII'?'selected':''}>${levelFullLabel('levelIII')}</option>
      </select>
      <select class="protool-protool-select">
        <option value="">Select ProTool</option>
        ${protoolOptions.map(t=>`<option ${t===presetProtool?'selected':''}>${t}</option>`).join("")}
      </select>
      <button type="button" class="btn small" style="background:var(--slate)" onclick="removeProtoolRow(this)">Remove</button>
    </div>`;
}
function addProtoolRow(containerId){
  const container = document.getElementById(containerId);
  container.insertAdjacentHTML("beforeend", protoolRowHtml(containerId, null, null));
}
function removeProtoolRow(btn){
  const row = btn.closest(".protool-row");
  const container = row.parentElement;
  if(container.children.length>1) row.remove();
  else alert("At least one ProTool selection is required while this tag is checked.");
}
function renderProtoolOptionsForRow(selectEl){
  const levelKey = selectEl.value;
  const row = selectEl.closest(".protool-row");
  const protoolSelect = row.querySelector(".protool-protool-select");
  if(!levelKey){ protoolSelect.innerHTML = `<option value="">Select ProTool</option>`; return; }
  const protools = state.levels[levelKey].protools;
  protoolSelect.innerHTML = `<option value="">Select ProTool</option>` + protools.map(t=>`<option>${t}</option>`).join("");
}
function collectProtoolRows(containerId){
  const rows = document.querySelectorAll(`#${containerId} .protool-row`);
  return Array.from(rows).map(row=>({
    level: row.querySelector(".protool-level-select").value || null,
    protool: row.querySelector(".protool-protool-select").value || null
  })).filter(p=>p.level && p.protool);
}

async function submitNewStory(){
  const text = document.getElementById("new-story-text").value;
  if(!text || !text.trim()){ alert("Write your story before submitting."); return; }
  const tags = Array.from(document.querySelectorAll(".story-tag-cb:checked")).map(cb=>cb.value);
  let protools = [];
  if(tags.includes("QPFP ProTool")){
    protools = collectProtoolRows("protool-rows-new");
    if(!protools.length){ alert("Select at least one level and ProTool since you've tagged QPFP ProTool."); return; }
  }
  const entry = {
    id: Date.now()+"-"+Math.random().toString(36).slice(2,7),
    email: state.profile.email, status: state.profile.status,
    tags, protools,
    story: text.trim(), timestamp: new Date().toISOString()
  };
  state.stories.push(entry);
  await saveStories();
  render();
}

  const box = document.getElementById("protool-fields");
  if(box) box.style.display = checked.includes("QPFP ProTool") ? "block" : "none";
}

function startEdit(id){ state.editingStoryId = id; render(); }
function cancelEdit(){ state.editingStoryId = null; render(); }

function handleEditTagToggle(cid, wrapId){
  const checked = Array.from(document.querySelectorAll(`.edit-tag-cb-${cid}:checked`)).map(cb=>cb.value);
  const box = document.getElementById(wrapId);
  if(box) box.style.display = checked.includes("QPFP ProTool") ? "block" : "none";
}

async function saveEdit(id){
  const s = state.stories.find(x=>x.id===id);
  if(!s) return;
  const textEl = document.getElementById(`edit-story-${id}`);
  if(textEl && !textEl.value.trim()){ alert("Story can't be empty."); return; }
  if(textEl) s.story = textEl.value.trim();
  const cid = cssId(id);
  const tags = Array.from(document.querySelectorAll(`.edit-tag-cb-${cid}:checked`)).map(cb=>cb.value);
  s.tags = tags;
  if(tags.includes("QPFP ProTool")){
    const protools = collectProtoolRows(`protool-rows-edit-${cid}`);
    if(!protools.length){ alert("Select at least one level and ProTool since you've tagged QPFP ProTool."); return; }
    s.protools = protools;
  } else {
    s.protools = [];
  }
  delete s.level; delete s.protool;
  await saveStories();
  state.editingStoryId = null;
  render();
}
function cssId(id){ return String(id).replace(/[^a-zA-Z0-9]/g,"_"); }

async function deleteStory(id){
  if(!confirm("Delete this story? This can't be undone.")) return;
  state.stories = state.stories.filter(s=>s.id!==id);
  await saveStories();
  render();
}

function protoolNamesFor(s){
  if(s.protools && s.protools.length) return s.protools.map(p=>p.protool);
  if(s.protool) return [s.protool];
  return [];
}

function tagsHtml(s){
  const tags = (s.tags && s.tags.length) ? s.tags : (state.sections.find(x=>x.id===s.section)?.label ? [state.sections.find(x=>x.id===s.section).label] : []);
  return tags.map(t=>`<span class="tag-pill">${t}</span>`).join("") + protoolNamesFor(s).map(p=>`<span class="tag-pill">${p}</span>`).join("");
}

function myStoriesHtml(){
  const mine = state.stories.filter(s=>s.email===state.profile.email).slice().reverse();
  if(!mine.length) return `<div class="card"><div class="empty">You haven't submitted any stories yet.</div></div>`;
  return mine.map(s=>{
    if(state.editingStoryId===s.id){
      const cid = cssId(s.id);
      const containerId = `protool-rows-edit-${cid}`;
      const wrapId = `${containerId}-wrap`;
      const hasProtoolTag = s.tags && s.tags.includes("QPFP ProTool");
      const existingProtools = (s.protools && s.protools.length) ? s.protools : (s.protool ? [{level:s.level, protool:s.protool}] : [{level:null,protool:null}]);
      return `
        <div class="card">
          <div class="row" style="flex-wrap:wrap;gap:10px;">
            ${state.tags.map(t=>`<label style="display:flex;align-items:center;gap:4px;font-size:13px;">
              <input type="checkbox" class="edit-tag-cb-${cid}" value="${t}" ${s.tags&&s.tags.includes(t)?'checked':''} onchange="handleEditTagToggle('${cid}','${wrapId}')"> ${t}
            </label>`).join("")}
          </div>
          <div id="${wrapId}" style="display:${hasProtoolTag?'block':'none'};margin-top:8px;">
            <div id="${containerId}">${existingProtools.map(p=>protoolRowHtml(containerId, p.level, p.protool)).join("")}</div>
            <button type="button" class="btn small" onclick="addProtoolRow('${containerId}')">+ Add another ProTool</button>
          </div>
          <textarea id="edit-story-${s.id}">${s.story}</textarea>
          <div class="row" style="margin-top:8px">
            <button class="btn small" onclick="saveEdit('${s.id}')">Save</button>
            <button class="btn small" style="background:var(--slate)" onclick="cancelEdit()">Cancel</button>
          </div>
        </div>`;
    }
    return `
      <div class="card">
        <div class="sub">${tagsHtml(s)} <span class="pill">${formatDate(s.timestamp)}</span></div>
        <div style="margin:6px 0;white-space:pre-wrap;">${s.story}</div>
        <div class="row">
          <button class="btn small" onclick="startEdit('${s.id}')">Edit</button>
          <button class="btn small" style="background:var(--orange-dark)" onclick="deleteStory('${s.id}')">Delete</button>
        </div>
      </div>`;
  }).join("");
}

function pointsFor(email){ return state.stories.filter(s=>s.email===email).length; }
function badgesFor(email){
  const n = pointsFor(email); const b=[];
  if(n>=1) b.push("Beginner");
  if(n>=5) b.push("Halfway there");
  if(n>=9) b.push("Implementation champion");
  return b;
}

function feedLabel(s){
  const protoolNames = protoolNamesFor(s);
  let labels = (s.tags && s.tags.length) ? s.tags.slice() : [];
  if(labels.includes("QPFP ProTool") && protoolNames.length){
    labels = labels.flatMap(t => t==="QPFP ProTool" ? protoolNames : [t]);
  }
  if(labels.length) return labels[0];
  return protoolNames[0] || state.sections.find(x=>x.id===s.section)?.label || s.section || "Story";
}

function formatDate(iso){
  const d = new Date(iso);
  const dd = String(d.getDate()).padStart(2,"0");
  const mm = String(d.getMonth()+1).padStart(2,"0");
  return `${dd}-${mm}-${d.getFullYear()}`;
}

function participantsRows(){
  let rows = state.profiles.filter(p=>p.approved);
  const q = state.participantsSearch.trim().toLowerCase();
  if(q) rows = rows.filter(p=>(p.name||"").toLowerCase().includes(q) || (p.email||"").toLowerCase().includes(q));
  const key = state.participantsSort;
  rows = rows.slice().sort((a,b)=>{
    if(key==="points") return pointsFor(b.email)-pointsFor(a.email);
    if(key==="status") return (a.status||"").localeCompare(b.status||"");
    if(key==="email") return (a.email||"").localeCompare(b.email||"");
    return (a.name||a.email||"").localeCompare(b.name||b.email||"");
  });
  return rows;
}
function participantsRowsHtml(){
  const rows = participantsRows();
  if(!rows.length) return `<tr><td colspan="5" class="empty">No participants found.</td></tr>`;
  return rows.map(p=>`<tr>
    <td><a class="link" onclick="openParticipantDetail('${p.email}')">${p.name||"—"}</a></td>
    <td>${p.email}</td><td>${p.status}</td><td>${pointsFor(p.email)}</td>
    <td>
      <button class="btn small" style="background:var(--slate)" onclick="suspendParticipant('${p.email}')">Suspend</button>
      <button class="btn small" style="background:var(--orange-dark)" onclick="deleteParticipant('${p.email}')">Delete</button>
    </td>
  </tr>`).join("");
}

function exportParticipantsCSV(){
  const rows = participantsRows();
  const header = ["Name","Email","Status","Points"];
  const lines = [header.join(",")];
  rows.forEach(p=>{
    const vals = [p.name||"", p.email, p.status, pointsFor(p.email)];
    lines.push(vals.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(","));
  });
  const blob = new Blob([lines.join("\n")], {type:"text/csv"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a"); a.href=url; a.download="qpfp_participants.csv"; a.click();
  URL.revokeObjectURL(url);
}
function exportParticipantsXLSX(){
  if(typeof XLSX === "undefined"){ alert("Excel export library still loading, try again in a moment."); return; }
  const rows = participantsRows();
  const data = rows.map(p=>({"Name":p.name||"", "Email":p.email, "Status":p.status, "Points":pointsFor(p.email)}));
  const ws = XLSX.utils.json_to_sheet(data);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Participants");
  XLSX.writeFile(wb, "qpfp_participants.xlsx");
}
function exportParticipantsPDF(){
  if(typeof window.jspdf === "undefined"){ alert("PDF export library still loading, try again in a moment."); return; }
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  const rows = participantsRows();
  const body = rows.map(p=>[p.name||"", p.email, p.status, pointsFor(p.email)]);
  doc.text("QPFP Participants", 14, 14);
  doc.autoTable({ head:[["Name","Email","Status","Points"]], body, startY:20, styles:{fontSize:8} });
  doc.save("qpfp_participants.pdf");
}


function trackerRows(){
  let rows = state.stories.slice();
  const f = state.trackerFilters;
  if(f.section) rows = rows.filter(s=>s.section===f.section);
  if(f.status) rows = rows.filter(s=>s.status===f.status);
  if(f.query){
    const q = f.query.trim().toLowerCase();
    rows = rows.filter(s=>(s.email||"").toLowerCase().includes(q) || (profileFor(s.email).name||"").toLowerCase().includes(q));
  }
  return rows.slice().reverse();
}
function trackerRowsHtml(){
  const rows = trackerRows();
  if(!rows.length) return `<tr><td colspan="4" class="empty">No stories found.</td></tr>`;
  return rows.map((s,i)=>{
    return `<tr>
      <td>${i+1}</td>
      <td>${formatDate(s.timestamp)}</td>
      <td><a class="link" onclick="openParticipantDetail('${s.email}')">${displayName(s.email)}</a></td>
      <td>${tagsHtml(s)}</td>
    </tr>`;
  }).join("");
}
function setTrackerFilter(key,val){ state.trackerFilters[key]=val; renderAdmin(); }
function handleTrackerSearch(v){
  state.trackerFilters.query = v;
  const el = document.getElementById("tracker-rows");
  if(el) el.innerHTML = trackerRowsHtml();
}

function exportCSV(){
  const rows = trackerRows();
  const header = ["Sr No","Date","Participant","Email","Tags","ProTool","Story"];
  const lines = [header.join(",")];
  rows.forEach((s,i)=>{
    const vals = [i+1, formatDate(s.timestamp), displayName(s.email), s.email, (s.tags||[]).join("; "), s.protool||"", s.story];
    lines.push(vals.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(","));
  });
  const blob = new Blob([lines.join("\n")], {type:"text/csv"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a"); a.href=url; a.download="qpfp_stories.csv"; a.click();
  URL.revokeObjectURL(url);
}
function exportXLSX(){
  if(typeof XLSX === "undefined"){ alert("Excel export library still loading, try again in a moment."); return; }
  const rows = trackerRows();
  const data = rows.map((s,i)=>({"Sr No":i+1, "Date":formatDate(s.timestamp), "Participant":displayName(s.email), "Email":s.email, "Tags":(s.tags||[]).join("; "), "ProTool":s.protool||"", "Story":s.story}));
  const ws = XLSX.utils.json_to_sheet(data);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Stories");
  XLSX.writeFile(wb, "qpfp_stories.xlsx");
}
function exportPDF(){
  if(typeof window.jspdf === "undefined"){ alert("PDF export library still loading, try again in a moment."); return; }
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  const rows = trackerRows();
  const body = rows.map((s,i)=>[i+1, formatDate(s.timestamp), displayName(s.email), (s.tags||[]).join("; "), s.protool||"", s.story.length>50?s.story.slice(0,50)+"…":s.story]);
  doc.text("QPFP Implementation Stories", 14, 14);
  doc.autoTable({ head:[["#","Date","Participant","Tags","ProTool","Story"]], body, startY:20, styles:{fontSize:7} });
  doc.save("qpfp_stories.pdf");
}

function openParticipantDetail(email){ state.viewingParticipantEmail = email; renderAdmin(); }
function closeParticipantDetail(){ state.viewingParticipantEmail = null; renderAdmin(); }

function participantDetailHtml(){
  const email = state.viewingParticipantEmail;
  if(!email) return "";
  const p = profileFor(email);
  const pts = pointsFor(email);
  const badges = badgesFor(email);
  const theirStories = state.stories.filter(s=>s.email===email).slice().reverse();
  return `
    <div class="modal-backdrop" onclick="if(event.target===this) closeParticipantDetail()">
      <div class="modal-box" style="width:70vw;height:75vh;max-width:70vw;max-height:75vh;">
        <button class="modal-close" onclick="closeParticipantDetail()">&times;</button>
        <div class="who">${avatarHtml(email,50)}<div><span class="nm">${p.name||email}</span><div class="city">${[p.city,p.status].filter(Boolean).join(" · ")}</div></div></div>
        <div class="stat-row" style="margin-top:14px;">
          <div class="stat"><div class="num">${pts}</div><div class="lbl">Points</div></div>
          <div class="stat"><div class="num">${badges.length}</div><div class="lbl">Badges<div class="badges">${badges.map(b=>`<span class="badge ${b==='Beginner'?'big':''}">${b}</span>`).join("")}</div></div></div>
        </div>
        <div class="section-title">Submitted stories</div>

          return `<div class="card"><div class="sub">${tagsHtml(s)}</div><div style="margin:6px 0;">${s.story}</div></div>`;

function setAdminTab(tab){ state.adminTab = tab; render(); }

    tabHtml = `

        <div class="card">

          <div class="row">
            <button class="btn small" onclick="approveParticipant('${p.email}')">Approve</button>
            <button class="btn small" style="background:var(--slate)" onclick="rejectPendingParticipant('${p.email}')">Reject</button>
          </div>

      <div class="section-title">Status update requests</div>
      ${state.profiles.filter(p=>p.pendingStatus).length ? state.profiles.filter(p=>p.pendingStatus).map(p=>`
        <div class="card">
          <div class="sub">${p.name||p.email} (${p.email}) requests: <b>${p.status}</b> → <b>${p.pendingStatus}</b></div>

          </div>

    tabHtml = `
      <div class="row">
        <select onchange="setParticipantsSort(this.value)">
          <option value="name" ${state.participantsSort==='name'?'selected':''}>Sort by name</option>
          <option value="email" ${state.participantsSort==='email'?'selected':''}>Sort by email</option>
          <option value="status" ${state.participantsSort==='status'?'selected':''}>Sort by status</option>
          <option value="points" ${state.participantsSort==='points'?'selected':''}>Sort by points</option>
        </select>
      </div>
      <div class="row"><input id="participants-search" placeholder="Search name or email" oninput="handleParticipantsSearch(this.value)"></div>
      <div class="row">

        <button class="btn small" onclick="exportParticipantsXLSX()">Download Excel</button>

      <div class="card">
        <table>
          <tr><th>Name</th><th>Email</th><th>Status</th><th>Points</th><th></th></tr>

        </table>
      </div>`;
  } else if(tab==="tracker"){
    tabHtml = `
      <div class="card">
        <table>
          <tr><th>Sr No</th><th>Date</th><th>Participant</th><th>Tags</th></tr>
          <tbody id="tracker-rows">${trackerRowsHtml()}</tbody>
        </table>
      </div>
      <div class="row">
        <button class="btn small" onclick="exportCSV()">Download CSV</button>
        <button class="btn small" onclick="exportXLSX()">Download Excel</button>
        <button class="btn small" onclick="exportPDF()">Download PDF</button>
      </div>`;
  } else if(tab==="content"){
    tabHtml = `
      <div class="section-title">Tags</div>
      <div class="card">
        ${state.tags.map((t,idx)=>`
          <div class="row" style="align-items:center;">
            <input id="tag-${idx}" value="${t}">
            <button class="btn small" onclick="editTag(${idx}, document.getElementById('tag-${idx}').value)">Save</button>
            <button class="btn small" style="background:var(--orange-dark)" onclick="deleteTag(${idx})">Delete</button>
          </div>`).join("")}
        <div class="row" style="margin-top:10px;">
          <input id="new-tag-name" placeholder="New tag name">
          <button class="btn small" onclick="addTag(document.getElementById('new-tag-name').value)">Add tag</button>
        </div>
        <div class="note">Renaming or deleting "QPFP ProTool" will disconnect the level/ProTool selection behavior tied to that exact tag name.</div>
      </div>

      <div class="section-title">Section titles</div>
      <div class="card">
        ${state.sections.map(sec=>`
          <div class="row" style="align-items:center;">
            <input id="sec-title-${sec.id}" value="${sec.label}">
            <button class="btn small" onclick="renameSectionTitle('${sec.id}', document.getElementById('sec-title-${sec.id}').value)">Save</button>

              <button class="btn small" style="background:var(--orange-dark)" onclick="deleteTopic('${levelKey}',${idx})">Delete</button>
            </div>`).join("")}
          <div class="row" style="margin-top:10px;">
            <input id="new-topic-${levelKey}" placeholder="New topic">

        ${state.batches.map(b=>`
          <div class="row" style="align-items:center;justify-content:space-between;">

    <div class="tabs">
      <button class="${tab==='access'?'active':''}" onclick="setAdminTab('access')">Participant access</button>

      <button class="${tab==='tracker'?'active':''}" onclick="setAdminTab('tracker')">Stories tracker</button>

function openStoryModal(id){ state.viewStoryId = id; render(); }
function closeStoryModal(){ state.viewStoryId = null; render(); }

function storiesMatchQuery(s, q){
  if(!q) return true;
  q = q.trim().toLowerCase();
  const tags = (s.tags||[]).join(" ").toLowerCase();
  const protools = protoolNamesFor(s).join(" ").toLowerCase();
  return tags.includes(q) || protools.includes(q);
}

function buildStoriesWallHtml(){
  const q = state.storySearchQuery || "";
  const filtered = state.stories.filter(s=>storiesMatchQuery(s,q));
  const list = filtered.slice().reverse();
  if(!list.length) return `<div class="empty">No stories match your search.</div>`;
  const cardHtml = s => `
    <div class="story-card" onclick="openStoryModal('${s.id}')">
      <div class="who">${avatarHtml(s.email,32)}<div><span class="nm">${displayName(s.email)}</span><div class="city">${[profileFor(s.email).city, badgesFor(s.email).join(", ")].filter(Boolean).join(" · ")}</div></div></div>
      <span class="tag">${feedLabel(s)}</span>
      <div class="txt">${s.story.length>140 ? s.story.slice(0,140)+"…" : s.story}</div>
    </div>`;
  const cards = list.map(cardHtml).join("");
  const rows = Math.ceil(list.length/3);
  const duration = Math.max(70, rows*30);
  return `<div class="wall-outer"><div class="wall-inner" style="animation-duration:${duration}s">${cards}${cards}</div></div>`;
}

function handleStorySearch(v){
  state.storySearchQuery = v;
  const el = document.getElementById("stories-wall-container");
  if(el) el.innerHTML = buildStoriesWallHtml();
}

function renderStories(){
  const loggedIn = state.profile || state.isAdmin;

  let modalHtml = "";
  if(state.viewStoryId){
    const s = state.stories.find(x=>x.id===state.viewStoryId);
    if(s){
      modalHtml = `
        <div class="modal-backdrop" onclick="if(event.target===this) closeStoryModal()">
          <div class="modal-box">
            <button class="modal-close" onclick="closeStoryModal()">&times;</button>
            <div class="who">${avatarHtml(s.email,44)}<div><span class="nm">${displayName(s.email)}</span><div class="city">${[profileFor(s.email).city, badgesFor(s.email).join(", ")].filter(Boolean).join(" · ")}</div></div></div>
            <span class="tag">${tagsHtml(s)}</span>
            <div class="txt" style="margin-top:12px;font-size:15px;line-height:1.6;">${s.story}</div>
          </div>
        </div>`;
    }
  }

  document.getElementById("app").innerHTML = `
    <div class="topbar" style="position:sticky;top:0;z-index:100;background:#fff;padding:14px 0;margin-bottom:18px;border-bottom:1px solid #e6ded1;">
      <div class="brand" style="margin-left:24px;gap:16px;">
        <img src="${NFP_LOGO}" style="height:56px;width:auto;">
        <div class="logo-divider"></div>
        <img src="${QPFP_LOGO}" class="mark-img" style="width:56px;height:56px;">
        <div><h1 style="font-size:28px;">QPFP Implementation Stories</h1></div>
      </div>
      <div class="navbar">
        ${loggedIn ? `<button class="navlink" onclick="goDashboard()">Your Dashboard</button><button class="logout" onclick="logout()">Log out</button>` : `<button class="navlink" onclick="backToLogin()">Log in</button>`}
      </div>
    </div>
    <div class="row" style="margin-bottom:18px;">
      <input id="story-search" placeholder="Search by tag or ProTool" oninput="handleStorySearch(this.value)" style="width:100%;">
    </div>
    <div id="stories-wall-container">${buildStoriesWallHtml()}</div>
    ${modalHtml}
  `;
}

function participantHeader(p){
  return `
    <div class="topbar" style="position:sticky;top:0;z-index:100;background:#fff;padding:14px 0;margin-bottom:18px;border-bottom:1px solid #e6ded1;">
      <div class="brand">
        ${avatarHtml(p.email,44)}
        <div><h1>${p.name && p.name.trim() ? p.name : p.email}</h1><p>${[p.city, p.status].filter(Boolean).join(" · ")}</p></div>
      </div>
      <div class="navbar">
        <button class="navlink ${state.screen==='dashboard'?'active':''}" onclick="goDashboard()">Your Stories</button>
        <button class="navlink ${state.screen==='leaderboard'?'active':''}" onclick="goLeaderboard()">Leaderboard</button>
        <button class="navlink ${state.screen==='stories'?'active':''}" onclick="goStories()">Implementation Stories</button>
        <button class="navlink ${state.screen==='profile'?'active':''}" onclick="goProfile()">Profile</button>
        <button class="logout" onclick="logout()">Log out</button>
      </div>
    </div>`;
}

function topNav(subtitle){
  return `
    <div class="topbar">
      <div class="brand" style="margin-left:24px;"><img src="${QPFP_LOGO}" class="mark-img" style="width:56px;height:56px;"><div><h1 style="font-size:28px;">QPFP Implementation Dashboard</h1><p>${subtitle}</p></div></div>
      <div class="navbar">
        ${state.profile ? `<button class="navlink ${state.screen==='dashboard'?'active':''}" onclick="goDashboard()">Your Stories</button><button class="navlink ${state.screen==='leaderboard'?'active':''}" onclick="goLeaderboard()">Leaderboard</button>` : ""}
        <button class="navlink ${state.screen==='stories'?'active':''}" onclick="goStories()">Implementation Stories</button>
        ${state.profile ? `<button class="navlink ${state.screen==='profile'?'active':''}" onclick="goProfile()">Profile</button>` : ""}
        <button class="logout" onclick="logout()">Log out</button>
      </div>
    </div>`;
}

function render(){
  const wrapEl = document.querySelector(".wrap");
  if(wrapEl){
    wrapEl.classList.toggle("wide", state.screen==="stories");
    wrapEl.classList.toggle("left-aligned", ["login","dashboard","profile","leaderboard"].includes(state.screen));
  }
  if(state.screen==="login"){ renderLogin(); return; }
  if(state.screen==="pending"){ renderPending(); return; }
  if(state.screen==="stories"){ renderStories(); return; }
  if(state.screen==="profile"){ renderProfile(); return; }
  if(state.screen==="leaderboard"){ renderLeaderboard(); return; }
  if(state.isAdmin){ renderAdmin(); } else { renderCandidate(); }
}

(async function init(){
  await loadShared();
  render();
})();
</script>
